<!DOCTYPE html>
<html>
<head>
<title>Incoming Transmission</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
padding-top:120px;
}

.progress{
width:300px;
height:20px;
border:1px solid #00ff00;
margin:auto;
}

.bar{
height:100%;
width:0%;
background:#00ff00;
}

#code{
margin-top:20px;
font-size:14px;
}

</style>

</head>

<body>

<h2>INCOMING TRANSMISSION</h2>

<p id="status">Decrypting message...</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="code"></div>

<script>

let progress = 0;
let bar = document.getElementById("bar");
let code = document.getElementById("code");

let interval = setInterval(function(){

progress += 2;

bar.style.width = progress + "%";

code.innerHTML += Math.random().toString(36).substring(2,10) + "<br>";

if(progress >= 100){

clearInterval(interval);

document.getElementById("status").innerHTML = "ACCESS GRANTED";

setTimeout(function(){

window.location.href = "flyer.html";

},1500);

}

},100);

</script>

</body>
</html>

</body>
</html>
